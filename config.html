<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KalaSpace - 书签管理</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>

/* ===== CSS Variables ===== */
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #161b22;
  --border: #30363d;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #00ff41;
  --accent-dim: #00cc33;
  --accent-bg: rgba(0,255,65,0.08);
  --accent-border: rgba(0,255,65,0.25);
  --danger: #f85149;
  --danger-bg: rgba(248,81,73,0.1);
  --warning: #d29922;
  --success: #3fb950;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
  --transition: all 0.2s ease;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Login Page ===== */
#loginPage {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; width: 100vw;
  background: var(--bg-primary);
}
.login-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  width: 360px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.login-box h1 {
  font-size: 1.5rem; margin-bottom: 8px;
  color: var(--accent);
  font-family: var(--font-mono);
}
.login-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 10px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.95rem;
  outline: none;
  transition: var(--transition);
}
.login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
.login-box .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 8px; min-height: 20px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 0.85rem;
  transition: var(--transition);
  white-space: nowrap;
}
.btn:hover { border-color: var(--text-muted); background: var(--bg-card); }
.btn-primary {
  background: var(--accent);
  color: #000; border-color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-danger { color: var(--danger); border-color: var(--danger); background: var(--danger-bg); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 0.78rem; }
.btn-block { width: 100%; justify-content: center; margin-top: 16px; padding: 10px; font-size: 0.95rem; }

/* ===== Main Layout ===== */
#mainApp { display: none; height: 100vh; flex-direction: column; }
#mainApp.active { display: flex; }

/* Top Bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 50px; min-height: 50px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-left h2 {
  font-size: 1rem; font-family: var(--font-mono);
  color: var(--accent);
}
.topbar-left .back-link { color: var(--text-secondary); font-size: 0.85rem; }
.topbar-left .back-link:hover { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Search */
.search-box {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 34px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 240px;
}
.search-box i { color: var(--text-muted); font-size: 0.9rem; }
.search-box input {
  flex: 1; border: none; background: none;
  color: var(--text-primary); font-size: 0.85rem;
  outline: none;
}

/* Content Area */
.content-area {
  display: flex; flex: 1; overflow: hidden;
}

/* Sidebar - Category Tree */
.sidebar {
  width: 260px; min-width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h3 { font-size: 0.85rem; color: var(--text-secondary); }
.category-list {
  flex: 1; overflow-y: auto; padding: 8px;
}
.cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.85rem;
  user-select: none;
}
.cat-item:hover { background: var(--bg-tertiary); }
.cat-item.active { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
.cat-item i.cat-icon { font-size: 1rem; color: var(--accent); width: 20px; text-align: center; }
.cat-item .cat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-item .cat-count { font-size: 0.75rem; color: var(--text-muted); }
.cat-item .cat-actions { display: none; gap: 2px; }
.cat-item:hover .cat-actions { display: flex; }
.cat-item .cat-actions button {
  background: none; border: none; color: var(--text-muted);
  font-size: 0.85rem; padding: 2px; transition: var(--transition);
}
.cat-item .cat-actions button:hover { color: var(--accent); }
.cat-item .cat-actions button.btn-del:hover { color: var(--danger); }

.subcat-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px 6px 40px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.subcat-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.subcat-item.active { color: var(--accent); background: var(--accent-bg); }
.subcat-item .subcat-name { flex: 1; }
.subcat-item .subcat-count { font-size: 0.7rem; color: var(--text-muted); }
.subcat-item .subcat-actions { display: none; gap: 2px; }
.subcat-item:hover .subcat-actions { display: flex; }
.subcat-item .subcat-actions button {
  background: none; border: none; color: var(--text-muted);
  font-size: 0.8rem; padding: 2px;
}
.subcat-item .subcat-actions button:hover { color: var(--danger); }

/* Main Panel */
.main-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  min-height: 50px;
}
.panel-title { font-size: 0.95rem; font-weight: 600; }
.panel-title i { color: var(--accent); margin-right: 6px; }
.panel-actions { display: flex; gap: 8px; align-items: center; }

/* Bookmark Table */
.bookmark-table-wrap {
  flex: 1; overflow-y: auto; padding: 0;
}
.bookmark-table {
  width: 100%; border-collapse: collapse;
}
.bookmark-table thead { position: sticky; top: 0; z-index: 10; }
.bookmark-table th {
  padding: 10px 16px; text-align: left;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem; color: var(--text-secondary);
  font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px;
  user-select: none;
}
.bookmark-table th:first-child { width: 40px; text-align: center; }
.bookmark-table th:last-child { width: 120px; text-align: center; }
.bookmark-table td {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
  vertical-align: middle;
}
.bookmark-table tr:hover td { background: var(--bg-secondary); }
.bookmark-table td:first-child { text-align: center; }
.bookmark-table td:last-child { text-align: center; }
.bookmark-table .bm-name { font-weight: 500; color: var(--text-primary); }
.bookmark-table .bm-url { color: var(--text-muted); font-size: 0.78rem; font-family: var(--font-mono); }
.bookmark-table .bm-url a { color: var(--text-muted); }
.bookmark-table .bm-url a:hover { color: var(--accent); }
.bookmark-table input[type="checkbox"] {
  accent-color: var(--accent);
  width: 16px; height: 16px;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; color: var(--text-muted);
}
.empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
.empty-state p { font-size: 0.9rem; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h3 {
  font-size: 1rem; margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  color: var(--accent);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 0.8rem; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-bg);
}
.form-group textarea { resize: vertical; min-height: 100px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

/* Toast */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 2000; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  max-width: 360px;
}
.toast.success { background: var(--success); color: #000; }
.toast.error { background: var(--danger); color: #fff; }
.toast.info { background: var(--accent); color: #000; }
@keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); }
.loading i { animation: spin 1s linear infinite; margin-right: 8px; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Batch bar */
.batch-bar {
  display: none; align-items: center; justify-content: space-between;
  padding: 8px 20px;
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent-border);
}
.batch-bar.active { display: flex; }
.batch-bar .batch-info { font-size: 0.85rem; color: var(--accent); }
.batch-bar .batch-actions { display: flex; gap: 8px; }

/* Import area */
.import-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 30px; text-align: center;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-muted);
}
.import-area:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.import-area i { font-size: 2rem; display: block; margin-bottom: 8px; }
.import-area p { font-size: 0.85rem; }

</style>
</head>
<body>
<div id="loginPage">
  <div class="login-box">
    <h1><i class="ri-shield-keyhole-line"></i> KalaSpace Admin</h1>
    <p>书签导航管理后台</p>
    <input type="password" id="loginPassword" placeholder="输入管理密码" autocomplete="off">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">
      <i class="ri-login-box-line"></i> 登录
    </button>
  </div>
</div>
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-left">
      <h2><i class="ri-shield-keyhole-line"></i> KalaSpace Admin</h2>
      <a href="/" class="back-link"><i class="ri-arrow-left-line"></i> 返回导航</a>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <i class="ri-search-line"></i>
        <input type="text" id="searchInput" placeholder="搜索书签..." oninput="doSearch()">
      </div>
      <button class="btn" onclick="openImportModal()"><i class="ri-upload-2-line"></i> 导入</button>
      <button class="btn" onclick="doExport('html')"><i class="ri-download-line"></i> 导出HTML</button>
      <button class="btn" onclick="doExport('json')"><i class="ri-code-s-slash-line"></i> 导出JSON</button>
      <button class="btn btn-primary" onclick="doRegenerate()"><i class="ri-refresh-line"></i> 重新生成</button>
      <button class="btn" onclick="doLogout()"><i class="ri-logout-box-line"></i></button>
    </div>
  </div>
  <div class="content-area">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3><i class="ri-folder-3-line"></i> 分类管理</h3>
        <button class="btn btn-sm" onclick="openAddCategoryModal()"><i class="ri-add-line"></i> 新增</button>
      </div>
      <div class="category-list" id="categoryList">
        <!-- dynamically populated -->
      </div>
    </div>
    <div class="main-panel">
      <div class="batch-bar" id="batchBar">
        <div class="batch-info">已选 <span id="selectedCount">0</span> 项</div>
        <div class="batch-actions">
          <button class="btn btn-danger btn-sm" onclick="doBatchDelete()"><i class="ri-delete-bin-line"></i> 批量删除</button>
          <button class="btn btn-sm" onclick="clearSelection()"><i class="ri-close-line"></i> 取消选择</button>
        </div>
      </div>
      <div class="panel-header">
        <div class="panel-title" id="panelTitle"><i class="ri-bookmark-line"></i> 全部书签</div>
        <div class="panel-actions" id="panelActions">
          <button class="btn btn-sm" onclick="openAddBookmarkModal()"><i class="ri-add-line"></i> 添加书签</button>
        </div>
      </div>
      <div class="bookmark-table-wrap" id="tableWrap">
        <div class="loading"><i class="ri-loader-4-line"></i> 加载中...</div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="bookmarkModal">
  <div class="modal">
    <h3 id="bmModalTitle"><i class="ri-bookmark-line"></i> 添加书签</h3>
    <input type="hidden" id="bmEditId">
    <div class="form-group">
      <label>书签名称</label>
      <input type="text" id="bmName" placeholder="例如: Nmap">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="bmUrl" placeholder="https://nmap.org">
    </div>
    <div class="form-group" id="bmCatGroup">
      <label>所属分类</label>
      <select id="bmCategory"></select>
    </div>
    <div class="form-group" id="bmSubCatGroup">
      <label>所属子分类</label>
      <select id="bmSubCategory"></select>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('bookmarkModal')">取消</button>
      <button class="btn btn-primary" onclick="saveBookmark()"><i class="ri-check-line"></i> 保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <h3 id="catModalTitle"><i class="ri-folder-line"></i> 添加分类</h3>
    <input type="hidden" id="catEditId">
    <div class="form-group">
      <label>分类名称</label>
      <input type="text" id="catName" placeholder="例如: Hacker-Tools">
    </div>
    <div class="form-group">
      <label>图标 (Remix Icon 类名)</label>
      <input type="text" id="catIcon" placeholder="ri-shield-line">
      <div class="form-hint">在 <a href="https://remixicon.com/" target="_blank">remixicon.com</a> 查找图标，填入类名如 ri-shield-line</div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('categoryModal')">取消</button>
      <button class="btn btn-primary" onclick="saveCategory()"><i class="ri-check-line"></i> 保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="subCatModal">
  <div class="modal">
    <h3><i class="ri-folder-3-line"></i> 添加子分类</h3>
    <input type="hidden" id="subCatParentId">
    <div class="form-group">
      <label>子分类名称</label>
      <input type="text" id="subCatName" placeholder="例如: 优秀渗透工具">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('subCatModal')">取消</button>
      <button class="btn btn-primary" onclick="saveSubCategory()"><i class="ri-check-line"></i> 保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3><i class="ri-upload-2-line"></i> 导入书签</h3>
    <div class="import-area" id="importArea" onclick="document.getElementById('importFile').click()">
      <i class="ri-file-upload-line"></i>
      <p>点击选择 Chrome 书签 HTML 文件</p>
    </div>
    <input type="file" id="importFile" accept=".html,.htm" style="display:none" onchange="handleImportFile(event)">
    <div id="importPreview" style="margin-top:16px; display:none;">
      <p style="font-size:0.85rem; color:var(--text-secondary);">解析结果: <span id="importCount">0</span> 个书签</p>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-primary" id="importConfirmBtn" onclick="doImport()" disabled><i class="ri-check-line"></i> 确认导入</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>

const API = '/api/bookmarks';
// Auth is cookie-based (Set-Cookie from login); TOKEN variable removed
let allData = null;  // full bookmark data
let currentCatId = null;  // currently selected category (null = all)
let currentSubCatId = null;  // currently selected subcategory (null = all in cat)
let searchQuery = '';
let importHtml = '';  // pending import content
let selectedIds = new Set();  // for batch delete

// ===== Auth =====
async function doLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (!pwd) return;
  const err = document.getElementById('loginError');
  err.textContent = '';
  try {
    const res = await postAPI({ action: 'login', password: pwd });
    if (res.success) {
      showApp();
    } else {
      err.textContent = res.error || '密码错误';
    }
  } catch (e) {
    err.textContent = '网络错误: ' + e.message;
  }
}

function doLogout() {
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

async function verifyToken() {
  try {
    const res = await postAPI({ action: 'verify' });
    return res.valid === true;
  } catch { return false; }
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  loadBookmarks();
}

// ===== API Helper =====
async function postAPI(body) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    credentials: 'same-origin',
  });
  return r.json();
}

// ===== Toast =====
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== Modal =====
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ===== Load Data =====
async function loadBookmarks() {
  try {
    const res = await postAPI({ action: 'getBookmarks' });
    if (res && res.categories) {
      allData = res;
      renderSidebar();
      renderTable();
    } else if (res && res.error) {
      toast('加载失败: ' + res.error, 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Render Sidebar =====
function renderSidebar() {
  const list = document.getElementById('categoryList');
  let html = '';

  // "All" item
  const totalBm = allData.categories.reduce((s, c) =>
    s + c.subCategories.reduce((s2, sc) => s2 + sc.bookmarks.length, 0), 0);
  html += `<div class="cat-item ${currentCatId === null && currentSubCatId === null ? 'active' : ''}" onclick="selectCategory(null)">
    <i class="ri-global-line cat-icon"></i>
    <span class="cat-name">全部书签</span>
    <span class="cat-count">${totalBm}</span>
  </div>`;

  allData.categories.forEach(cat => {
    const bmCount = cat.subCategories.reduce((s, sc) => s + sc.bookmarks.length, 0);
    const isCatActive = currentCatId === cat.id && currentSubCatId === null;

    html += `<div class="cat-item ${isCatActive ? 'active' : ''}" onclick="selectCategory(${cat.id})">
      <i class="${cat.icon} cat-icon"></i>
      <span class="cat-name">${esc(cat.name)}</span>
      <span class="cat-count">${bmCount}</span>
      <span class="cat-actions">
        <button title="编辑" onclick="event.stopPropagation();openEditCategoryModal(${cat.id})"><i class="ri-edit-line"></i></button>
        <button title="添加子分类" onclick="event.stopPropagation();openAddSubCatModal(${cat.id})"><i class="ri-add-line"></i></button>
        <button title="删除" class="btn-del" onclick="event.stopPropagation();deleteCategory(${cat.id})"><i class="ri-delete-bin-line"></i></button>
      </span>
    </div>`;

    // Sub-categories
    if (currentCatId === cat.id) {
      cat.subCategories.forEach((sc, idx) => {
        const isSubActive = currentSubCatId === sc.id;
        html += `<div class="subcat-item ${isSubActive ? 'active' : ''}" onclick="selectSubCategory(${cat.id}, '${sc.id}')">
          <i class="ri-folder-3-line"></i>
          <span class="subcat-name">${esc(sc.name)}</span>
          <span class="subcat-count">${sc.bookmarks.length}</span>
          <span class="subcat-actions">
            <button title="删除" onclick="event.stopPropagation();deleteSubCategory(${cat.id}, '${sc.id}')"><i class="ri-delete-bin-line"></i></button>
          </span>
        </div>`;
      });
    }
  });

  list.innerHTML = html;
}

// ===== Select Category / SubCategory =====
function selectCategory(catId) {
  currentCatId = catId;
  currentSubCatId = null;
  selectedIds.clear();
  updateBatchBar();
  renderSidebar();
  renderTable();
  // Update panel title
  if (catId === null) {
    document.getElementById('panelTitle').innerHTML = '<i class="ri-bookmark-line"></i> 全部书签';
  } else {
    const cat = allData.categories.find(c => c.id === catId);
    document.getElementById('panelTitle').innerHTML = `<i class="${cat.icon}"></i> ${esc(cat.name)}`;
  }
}

function selectSubCategory(catId, subCatId) {
  currentCatId = catId;
  currentSubCatId = subCatId;
  selectedIds.clear();
  updateBatchBar();
  renderSidebar();
  renderTable();
  const cat = allData.categories.find(c => c.id === catId);
  const sc = cat.subCategories.find(s => s.id === subCatId);
  document.getElementById('panelTitle').innerHTML = `<i class="${cat.icon}"></i> ${esc(cat.name)} / ${esc(sc.name)}`;
}

// ===== Render Bookmark Table =====
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  let bookmarks = [];

  if (currentCatId === null) {
    // All bookmarks
    allData.categories.forEach(cat => {
      cat.subCategories.forEach(sc => {
        sc.bookmarks.forEach(bm => {
          bookmarks.push({ ...bm, catName: cat.name, subCatName: sc.name, catId: cat.id, subCatId: sc.id });
        });
      });
    });
  } else {
    const cat = allData.categories.find(c => c.id === currentCatId);
    if (!cat) { wrap.innerHTML = '<div class="empty-state"><i class="ri-inbox-line"></i><p>分类不存在</p></div>'; return; }
    if (currentSubCatId) {
      const sc = cat.subCategories.find(s => s.id === currentSubCatId);
      if (!sc) { wrap.innerHTML = '<div class="empty-state"><i class="ri-inbox-line"></i><p>子分类不存在</p></div>'; return; }
      sc.bookmarks.forEach(bm => {
        bookmarks.push({ ...bm, catName: cat.name, subCatName: sc.name, catId: cat.id, subCatId: sc.id });
      });
    } else {
      cat.subCategories.forEach(sc => {
        sc.bookmarks.forEach(bm => {
          bookmarks.push({ ...bm, catName: cat.name, subCatName: sc.name, catId: cat.id, subCatId: sc.id });
        });
      });
    }
  }

  // Search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    bookmarks = bookmarks.filter(bm =>
      bm.name.toLowerCase().includes(q) || bm.url.toLowerCase().includes(q) || bm.domain.toLowerCase().includes(q)
    );
  }

  if (bookmarks.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><i class="ri-search-eye-line"></i><p>${searchQuery ? '没有匹配的书签' : '暂无书签'}</p></div>`;
    return;
  }

  let html = '<table class="bookmark-table"><thead><tr>';
  html += '<th><input type="checkbox" onchange="toggleSelectAll(this.checked)"></th>';
  html += '<th>名称</th><th>URL</th><th>分类</th><th>操作</th>';
  html += '</tr></thead><tbody>';

  bookmarks.forEach(bm => {
    const checked = selectedIds.has(bm.id) ? 'checked' : '';
    html += `<tr>
      <td><input type="checkbox" ${checked} onchange="toggleSelect('${bm.id}', this.checked)"></td>
      <td class="bm-name">${esc(bm.name)}</td>
      <td class="bm-url"><a href="${esc(bm.url)}" target="_blank">${esc(bm.domain)}</a></td>
      <td style="font-size:0.78rem;color:var(--text-secondary)">${esc(bm.catName)} / ${esc(bm.subCatName)}</td>
      <td>
        <button class="btn btn-sm" onclick="openEditBookmarkModal('${bm.id}')"><i class="ri-edit-line"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deleteBookmark('${bm.id}')"><i class="ri-delete-bin-line"></i></button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ===== Selection / Batch =====
function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBatchBar();
}

function toggleSelectAll(checked) {
  // Select all visible bookmarks
  const cbs = document.querySelectorAll('.bookmark-table tbody input[type="checkbox"]');
  cbs.forEach(cb => {
    const tr = cb.closest('tr');
    // Extract bookmark ID from edit button
    const editBtn = tr.querySelector('button[onclick*="openEditBookmarkModal"]');
    if (editBtn) {
      const match = editBtn.getAttribute('onclick').match(/'([^']+)'/);
      if (match) {
        const id = match[1];
        if (checked) selectedIds.add(id); else selectedIds.delete(id);
        cb.checked = checked;
      }
    }
  });
  updateBatchBar();
}

function clearSelection() {
  selectedIds.clear();
  updateBatchBar();
  renderTable();
}

function updateBatchBar() {
  const bar = document.getElementById('batchBar');
  if (selectedIds.size > 0) {
    bar.classList.add('active');
    document.getElementById('selectedCount').textContent = selectedIds.size;
  } else {
    bar.classList.remove('active');
  }
}

async function doBatchDelete() {
  if (selectedIds.size === 0) return;
  if (!confirm(`确定删除 ${selectedIds.size} 个书签？`)) return;
  try {
    const res = await postAPI({ action: 'batchDelete', ids: Array.from(selectedIds) });
    if (res.success) {
      toast(`已删除 ${res.deleted} 个书签`, 'success');
      selectedIds.clear();
      updateBatchBar();
      await loadBookmarks();
    } else {
      toast('删除失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Search =====
function doSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  renderTable();
}

// ===== Add/Edit Bookmark =====
function openAddBookmarkModal() {
  document.getElementById('bmModalTitle').innerHTML = '<i class="ri-add-line"></i> 添加书签';
  document.getElementById('bmEditId').value = '';
  document.getElementById('bmName').value = '';
  document.getElementById('bmUrl').value = '';
  // Populate category select
  populateCategorySelects(currentCatId);
  openModal('bookmarkModal');
}

function openEditBookmarkModal(id) {
  // Find bookmark
  let bm = null, bmCatId = null, bmSubCatId = null;
  for (const cat of allData.categories) {
    for (const sc of cat.subCategories) {
      const found = sc.bookmarks.find(b => b.id === id);
      if (found) { bm = found; bmCatId = cat.id; bmSubCatId = sc.id; break; }
    }
    if (bm) break;
  }
  if (!bm) return;

  document.getElementById('bmModalTitle').innerHTML = '<i class="ri-edit-line"></i> 编辑书签';
  document.getElementById('bmEditId').value = id;
  document.getElementById('bmName').value = bm.name;
  document.getElementById('bmUrl').value = bm.url;
  populateCategorySelects(bmCatId, bmSubCatId);
  openModal('bookmarkModal');
}

function populateCategorySelects(preselectCatId, preselectSubCatId) {
  const catSel = document.getElementById('bmCategory');
  catSel.innerHTML = allData.categories.map(c =>
    `<option value="${c.id}" ${c.id === preselectCatId ? 'selected' : ''}>${esc(c.name)}</option>`
  ).join('');
  populateSubCategorySelect(preselectCatId, preselectSubCatId);
  catSel.onchange = () => populateSubCategorySelect(parseInt(catSel.value));
}

function populateSubCategorySelect(catId, preselectSubCatId) {
  const subSel = document.getElementById('bmSubCategory');
  const cat = allData.categories.find(c => c.id === catId);
  if (!cat) { subSel.innerHTML = ''; return; }
  subSel.innerHTML = cat.subCategories.map(sc =>
    `<option value="${sc.id}" ${sc.id === preselectSubCatId ? 'selected' : ''}>${esc(sc.name)}</option>`
  ).join('');
}

async function saveBookmark() {
  const id = document.getElementById('bmEditId').value;
  const name = document.getElementById('bmName').value.trim();
  let url = document.getElementById('bmUrl').value.trim();
  const catId = parseInt(document.getElementById('bmCategory').value);
  const subCatId = document.getElementById('bmSubCategory').value;

  if (!name || !url) { toast('名称和URL不能为空', 'error'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;

  const action = id ? 'updateBookmark' : 'addBookmark';
  const body = { action, name, url, categoryId: catId, subCategoryId: subCatId };
  if (id) body.bookmarkId = id;

  try {
    const res = await postAPI(body);
    if (res.success) {
      toast(id ? '书签已更新' : '书签已添加', 'success');
      closeModal('bookmarkModal');
      await loadBookmarks();
    } else {
      toast('操作失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

async function deleteBookmark(id) {
  if (!confirm('确定删除该书签？')) return;
  try {
    const res = await postAPI({ action: 'deleteBookmark', bookmarkId: id });
    if (res.success) {
      toast('已删除', 'success');
      selectedIds.delete(id);
      await loadBookmarks();
    } else {
      toast('删除失败', 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Add/Edit Category =====
function openAddCategoryModal() {
  document.getElementById('catModalTitle').innerHTML = '<i class="ri-add-line"></i> 添加分类';
  document.getElementById('catEditId').value = '';
  document.getElementById('catName').value = '';
  document.getElementById('catIcon').value = 'ri-folder-line';
  openModal('categoryModal');
}

function openEditCategoryModal(id) {
  const cat = allData.categories.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('catModalTitle').innerHTML = '<i class="ri-edit-line"></i> 编辑分类';
  document.getElementById('catEditId').value = id;
  document.getElementById('catName').value = cat.name;
  document.getElementById('catIcon').value = cat.icon;
  openModal('categoryModal');
}

async function saveCategory() {
  const id = document.getElementById('catEditId').value;
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catIcon').value.trim();
  if (!name) { toast('分类名不能为空', 'error'); return; }

  const action = id ? 'updateCategory' : 'addCategory';
  const body = { action, name, icon: icon || 'ri-folder-line' };
  if (id) body.categoryId = parseInt(id);

  try {
    const res = await postAPI(body);
    if (res.success) {
      toast(id ? '分类已更新' : '分类已添加', 'success');
      closeModal('categoryModal');
      await loadBookmarks();
    } else {
      toast('操作失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

async function deleteCategory(id) {
  if (!confirm('确定删除该分类及其所有子分类和书签？')) return;
  try {
    const res = await postAPI({ action: 'deleteCategory', categoryId: id });
    if (res.success) {
      toast('已删除', 'success');
      currentCatId = null;
      currentSubCatId = null;
      await loadBookmarks();
      selectCategory(null);
    } else {
      toast('删除失败', 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Add/Delete SubCategory =====
function openAddSubCatModal(catId) {
  document.getElementById('subCatParentId').value = catId;
  document.getElementById('subCatName').value = '';
  openModal('subCatModal');
}

async function saveSubCategory() {
  const catId = parseInt(document.getElementById('subCatParentId').value);
  const name = document.getElementById('subCatName').value.trim();
  if (!name) { toast('子分类名不能为空', 'error'); return; }

  try {
    const res = await postAPI({ action: 'addSubCategory', categoryId: catId, name });
    if (res.success) {
      toast('子分类已添加', 'success');
      closeModal('subCatModal');
      currentCatId = catId;
      await loadBookmarks();
      selectCategory(catId);
    } else {
      toast('操作失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

async function deleteSubCategory(catId, subCatId) {
  if (!confirm('确定删除该子分类及其所有书签？')) return;
  try {
    const res = await postAPI({ action: 'deleteSubCategory', categoryId: catId, subCategoryId: subCatId });
    if (res.success) {
      toast('已删除', 'success');
      currentSubCatId = null;
      await loadBookmarks();
      selectCategory(catId);
    } else {
      toast('删除失败', 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Import =====
function openImportModal() {
  importHtml = '';
  document.getElementById('importFile').value = '';
  document.getElementById('importPreview').style.display = 'none';
  document.getElementById('importConfirmBtn').disabled = true;
  openModal('importModal');
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    importHtml = ev.target.result;
    // Quick count
    const count = (importHtml.match(/<DT><A /gi) || []).length;
    document.getElementById('importCount').textContent = count;
    document.getElementById('importPreview').style.display = 'block';
    document.getElementById('importConfirmBtn').disabled = false;
  };
  reader.readAsText(file);
}

async function doImport() {
  if (!importHtml) return;
  try {
    const res = await postAPI({ action: 'importChrome', html: importHtml });
    if (res.success) {
      toast(`已导入 ${res.imported} 个书签`, 'success');
      closeModal('importModal');
      await loadBookmarks();
    } else {
      toast('导入失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Export =====
async function doExport(format) {
  try {
    const action = format === 'html' ? 'exportHtml' : 'exportJson';
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
      credentials: 'same-origin',
    });
    if (!r.ok) { toast('导出失败', 'error'); return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = format === 'html' ? 'kalaspace_bookmarks.html' : 'kalaspace_bookmarks.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('导出成功', 'success');
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Regenerate =====
async function doRegenerate() {
  if (!confirm('重新生成 index.html 并推送到 GitHub？这可能需要几分钟。')) return;
  toast('正在生成...', 'info');
  try {
    const res = await postAPI({ action: 'regenerate' });
    if (res.success) {
      toast('index.html 已重新生成并推送到 GitHub!', 'success');
    } else {
      toast('生成失败: ' + (res.error || ''), 'error');
    }
  } catch (e) {
    toast('网络错误: ' + e.message, 'error');
  }
}

// ===== Utils =====
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
    doLogin();
  }
});

// ===== Init =====
(async function init() {
  const ok = await verifyToken();
  if (ok) showApp();
})();

</script>
